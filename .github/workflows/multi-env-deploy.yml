 name : multi_env_deploy.yml

 on:
  workflow_dispatch:
    inputs:
      name:
        description: "environment"
        required: true
        type: string
        options:
          - dev
          - staging
          - prod
jobs:
  print_input:
    runs-on: ubuntu-latest
    steps:
      - name: Print input
        run: echo "${{ inputs.name}}"
